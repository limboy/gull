<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:" />
    <title>Settings</title>
    <link rel="stylesheet" href="styles/settings.css" />
  </head>
  <body>
    <div id="settings-layout">
      <div id="settings-title-bar"></div>

      <div id="settings-sidebar">
        <div class="settings-nav-item active" data-section="general">
          <svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 0 0 .12-.61l-1.92-3.32a.49.49 0 0 0-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.484.484 0 0 0-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96a.49.49 0 0 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58a.49.49 0 0 0-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6A3.6 3.6 0 1 1 12 8.4a3.6 3.6 0 0 1 0 7.2z"/></svg>
          General
        </div>
        <div class="settings-nav-item" data-section="appearance">
          <svg viewBox="0 0 24 24"><path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9c.83 0 1.5-.67 1.5-1.5 0-.39-.15-.74-.39-1.01-.23-.26-.38-.61-.38-1 0-.83.67-1.5 1.5-1.5H16c2.76 0 5-2.24 5-5 0-4.42-4.03-8-9-8zm-5.5 9c-.83 0-1.5-.67-1.5-1.5S5.67 9 6.5 9 8 9.67 8 10.5 7.33 12 6.5 12zm3-4C8.67 8 8 7.33 8 6.5S8.67 5 9.5 5s1.5.67 1.5 1.5S10.33 8 9.5 8zm5 0c-.83 0-1.5-.67-1.5-1.5S13.67 5 14.5 5s1.5.67 1.5 1.5S15.33 8 14.5 8zm3 4c-.83 0-1.5-.67-1.5-1.5S16.67 9 17.5 9s1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/></svg>
          Appearance
        </div>
      </div>

      <div id="settings-content">
        <!-- General Section -->
        <div class="settings-section active" data-panel="general">
          <div class="settings-section-title">General</div>

          <div class="setting-row">
            <div class="setting-label">
              <span class="setting-label-text">Language</span>
            </div>
            <select class="setting-select" id="setting-language">
              <option value="en">English</option>
              <option value="zh-CN">简体中文</option>
              <option value="zh-TW">繁體中文</option>
              <option value="ja">日本語</option>
            </select>
          </div>

          <div class="setting-row">
            <div class="setting-label">
              <span class="setting-label-text">Send message with</span>
            </div>
            <select class="setting-select" id="setting-send-key">
              <option value="enter">Enter</option>
              <option value="cmd-enter">⌘ Enter</option>
            </select>
          </div>

          <div class="setting-row">
            <div class="setting-label">
              <span class="setting-label-text">Auto-hide dock icon</span>
            </div>
            <label class="setting-toggle">
              <input type="checkbox" id="setting-auto-hide-dock" />
              <span class="toggle-slider"></span>
            </label>
          </div>

          <div class="setting-row">
            <div class="setting-label">
              <span class="setting-label-text">Scroll chat to bottom</span>
              <span class="setting-label-desc">Auto-scroll the chat to bottom while responding</span>
            </div>
            <label class="setting-toggle">
              <input type="checkbox" id="setting-scroll-bottom" checked />
              <span class="toggle-slider"></span>
            </label>
          </div>
        </div>

        <!-- Appearance Section -->
        <div class="settings-section" data-panel="appearance">
          <div class="settings-section-title">Appearance</div>

          <div class="setting-row">
            <div class="setting-label">
              <span class="setting-label-text">Theme</span>
            </div>
            <select class="setting-select" id="setting-theme">
              <option value="dark">Dark</option>
              <option value="light">Light</option>
              <option value="system">System</option>
            </select>
          </div>

          <div class="setting-row">
            <div class="setting-label">
              <span class="setting-label-text">Font size</span>
            </div>
            <div class="font-size-control">
              <input type="range" id="setting-font-size" min="12" max="20" value="14" step="1" />
              <span class="font-size-value" id="font-size-display">14px</span>
            </div>
          </div>

          <div class="setting-row">
            <div class="setting-label">
              <span class="setting-label-text">Font family</span>
            </div>
            <select class="setting-select" id="setting-font-family">
              <option value="system">System Default</option>
              <option value="serif">Serif</option>
              <option value="sans-serif">Sans Serif</option>
              <option value="monospace">Monospace</option>
            </select>
          </div>

          <div class="setting-row">
            <div class="setting-label">
              <span class="setting-label-text">Line height</span>
            </div>
            <select class="setting-select" id="setting-line-height">
              <option value="1.4">Compact</option>
              <option value="1.6" selected>Normal</option>
              <option value="1.8">Relaxed</option>
              <option value="2.0">Spacious</option>
            </select>
          </div>
        </div>
      </div>
    </div>
    <script src="settings-renderer.js"></script>
  </body>
</html>

<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:" />
    <title>Yara</title>
    <link rel="stylesheet" href="styles/main.css" />
    <link rel="stylesheet" href="styles/main-area.css" />
    <link rel="stylesheet" href="styles/sidebar-right.css" />
    <link rel="stylesheet" href="styles/resize.css" />
  </head>
  <body>
    <div id="app-layout">
      <!-- Main Area -->
      <div id="main-area">
        <div id="tab-bar">
          <div id="tab-bar-drag" class="tab-bar-drag"></div>
          <div id="tab-bar-tabs"></div>
          <button id="toggle-right-sidebar" title="Toggle outline sidebar">
            <svg class="sidebar-open" viewBox="0 0 100 100"><rect x="10" y="10" width="80" height="80" rx="15" ry="15" fill="none" stroke="currentColor" stroke-width="8"/><rect x="57" y="22" width="20" height="56" rx="6" ry="6" fill="currentColor"/></svg>
            <svg class="sidebar-closed" viewBox="0 0 100 100"><rect x="10" y="10" width="80" height="80" rx="15" ry="15" fill="none" stroke="currentColor" stroke-width="8"/><line x1="75" y1="25" x2="75" y2="75" stroke="currentColor" stroke-width="6" stroke-linecap="round"/></svg>
          </button>
        </div>
        <div id="content-wrapper">
          <div id="content-area">
            <div class="empty-state" id="empty-state">
              <div class="empty-state-content">
                <svg class="empty-icon" viewBox="0 0 48 48"><path d="M14 4h14l10 10v26a4 4 0 0 1-4 4H14a4 4 0 0 1-4-4V8a4 4 0 0 1 4-4zm12 2v9h9l-9-9zM14 6v34h20V17h-9a3 3 0 0 1-3-3V6H14z"/></svg>
                <p>Open an EPUB file to start reading</p>
                <p class="empty-hint">Use File > Open or drag and drop</p>
              </div>
            </div>
          </div>
          <div id="chapter-scrollbar"></div>
        </div>
      </div>

      <!-- Resize Handle: Right -->
      <div class="resize-handle" id="resize-right"></div>

      <!-- Right Sidebar (Outline) -->
      <div id="right-sidebar">
        <div class="sidebar-header">Table of Contents</div>
        <div id="outline-panel" class="outline-panel-content">
        </div>
      </div>
    </div>
    <script src="renderer.js"></script>
  </body>
</html>
